<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Todo App</title>
 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <div class="header-container">
      <h1>Tasks</h1>
      <p class="subtitle">Stay organized and focused.</p>
    </div>

    <div class="todo-app">
      <button id="open-task-form-btn" class="btn btn-primary large-btn">
        + Add New Task
      </button>

      <form class="task-form hidden" id="task-form">
        <div class="task-form-header">
          <h2>New Task</h2>
          <button id="close-task-form-btn" class="icon-btn" type="button" aria-label="close">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="task-form-body">
          <div class="input-group">
            <label for="title-input">Title</label>
            <input required type="text" class="form-control" id="title-input" placeholder="e.g., Buy groceries" />
          </div>
          <div class="input-group">
            <label for="date-input">Due Date</label>
            <input type="date" class="form-control" id="date-input" />
          </div>
          <div class="input-group">
            <label for="description-input">Description</label>
            <textarea class="form-control" id="description-input" placeholder="Add some details..." rows="4"></textarea>
          </div>
        </div>
        <div class="task-form-footer">
          <button id="add-or-update-task-btn" class="btn btn-primary w-100" type="submit">
            Save Task
          </button>
        </div>
      </form>

      <dialog id="confirm-close-dialog">
        <form method="dialog" class="dialog-content">
          <h3>Discard unsaved changes?</h3>
          <p>If you leave now, your edits will be lost.</p>
          <div class="dialog-actions">
            <button id="cancel-btn" class="btn btn-secondary">Keep Editing</button>
            <button id="discard-btn" class="btn btn-danger">Discard</button>
          </div>
        </form>
      </dialog>

      <div id="tasks-container"></div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
